<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7-Day Meal Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F4;
    --parchment: #F2EDE4;
    --warm-gray: #8C8179;
    --mid-gray: #C5BFB8;
    --dark: #1E1A17;
    --text: #2E2925;
    --muted: #6B6460;
    --green: #3A7D5E;
    --amber: #C07A2A;
    --rose: #A8506A;
    --blue: #2E6EA6;
    --red: #B84040;
    --border: rgba(0,0,0,0.07);
    --border-strong: rgba(0,0,0,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  .page {
    max-width: 740px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* Page Header */
  .page-header {
    margin-bottom: 1.75rem;
    padding-bottom: 1.5rem;
    border-bottom: 1.5px solid var(--border-strong);
  }

  .page-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 10px;
  }

  .page-badge::before {
    content: '';
    width: 20px; height: 1.5px;
    background: var(--amber);
    display: block;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: 1.9rem;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .page-sub {
    font-size: 13.5px;
    color: var(--muted);
  }

  /* Weekly summary */
  .weekly-summary {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 1.25rem;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .weekly-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--mid-gray);
    flex-shrink: 0;
  }

  .weekly-stats {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    flex: 1;
  }

  .w-stat {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .w-val {
    font-size: 17px;
    font-weight: 600;
    color: var(--dark);
  }

  .w-sub {
    font-size: 10px;
    color: var(--warm-gray);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .weekly-note {
    font-size: 12px;
    color: var(--mid-gray);
    font-style: italic;
    margin-left: auto;
  }

  /* Macro bar */
  .macro-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .macro-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 12px;
    position: relative;
    overflow: hidden;
  }

  .macro-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 0 0 var(--radius) var(--radius);
  }

  .macro-card.cal::after    { background: var(--blue); }
  .macro-card.protein::after{ background: var(--green); }
  .macro-card.carbs::after  { background: var(--amber); }
  .macro-card.fat::after    { background: var(--rose); }

  .macro-lbl {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--warm-gray);
    margin-bottom: 3px;
  }

  .macro-val {
    font-size: 20px;
    font-weight: 600;
    color: var(--dark);
    line-height: 1;
  }

  .macro-val.over { color: var(--red); }
  .macro-unit { font-size: 11px; font-weight: 400; color: var(--warm-gray); }
  .macro-target { font-size: 10px; color: var(--mid-gray); margin-top: 3px; }

  .prog-track {
    height: 3px;
    background: var(--parchment);
    border-radius: 2px;
    margin-top: 8px;
  }

  .prog-fill {
    height: 3px;
    border-radius: 2px;
    transition: width 0.35s ease;
  }

  /* Day tabs */
  .day-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .day-tab {
    padding: 7px 14px;
    border-radius: 50px;
    border: 1px solid var(--border-strong);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: white;
    color: var(--muted);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .day-tab:hover { border-color: var(--dark); color: var(--dark); }

  .day-tab.active {
    background: var(--dark);
    color: white;
    border-color: var(--dark);
  }

  .day-tab .tab-cal {
    font-size: 10px;
    opacity: 0.65;
    font-weight: 400;
  }

  .day-tab.over-cal .tab-cal { color: #FF7070; opacity: 1; }

  /* Meal list */
  .meals-list { display: flex; flex-direction: column; gap: 10px; }

  .meal-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .meal-header {
    display: flex;
    align-items: center;
    padding: 13px 16px;
    cursor: pointer;
    user-select: none;
    gap: 10px;
    transition: background 0.1s;
  }

  .meal-header:hover { background: var(--cream); }

  .meal-left { flex: 1; min-width: 0; }

  .meal-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
    line-height: 1.2;
  }

  .meal-dish {
    font-size: 12px;
    color: var(--warm-gray);
    font-style: italic;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .meal-macros {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    align-items: center;
  }

  .meal-macro-tag {
    font-size: 12px;
    color: var(--warm-gray);
    font-weight: 500;
  }

  .meal-cal {
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
  }

  .meal-sep { font-size: 11px; color: var(--mid-gray); }

  .chevron {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--parchment);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--warm-gray);
    transition: transform 0.2s;
    flex-shrink: 0;
    border: none; cursor: pointer;
  }

  .chevron.open { transform: rotate(180deg); }

  .meal-body {
    border-top: 1px solid var(--border);
    padding: 0 16px 14px;
  }

  .recipe-block {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    padding: 12px 0 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .food-hdr, .food-row {
    display: grid;
    grid-template-columns: 1fr 52px 44px 44px 44px;
    gap: 4px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
    font-size: 12.5px;
  }

  .food-row:last-child { border-bottom: none; }
  .food-hdr { padding: 10px 0 6px; }

  .hdr-c {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--mid-gray);
    text-align: right;
  }
  .hdr-c:first-child { text-align: left; }

  .food-name { color: var(--text); }
  .food-qty { font-size: 11px; color: var(--mid-gray); }
  .num { text-align: right; color: var(--warm-gray); font-size: 12px; }

  @media (max-width: 560px) {
    .macro-grid { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 1.5rem; }
    .weekly-summary { flex-direction: column; gap: 12px; }
    .weekly-note { margin-left: 0; }
    .meal-macros { display: none; }
  }
</style>
</head>

const r = n => Math.round(n);
let currentDay = 0;
const openMeals = {};

function calcDay(day) {
  let t = {cal:0,p:0,c:0,f:0};
  day.meals.forEach(m => m.foods.forEach(f => { t.cal+=f.cal; t.p+=f.p; t.c+=f.c; t.f+=f.f; }));
  return t;
}

function pct(val, target) { return Math.min(100, r(val/target*100)); }

function renderWeekly() {
  const tots = DAYS.map(calcDay);
  const wCal = tots.reduce((a,b)=>a+b.cal,0);
  const wP   = tots.reduce((a,b)=>a+b.p,0);
  const wC   = tots.reduce((a,b)=>a+b.c,0);
  const wF   = tots.reduce((a,b)=>a+b.f,0);
  const avgCal = r(wCal/7), avgP = r(wP/7), avgC = r(wC/7), avgF = r(wF/7);
  const diff = TARGETS.cal - avgCal;
  const noteText = diff > 0 ? `${Math.abs(diff)} kcal under daily target` : diff < 0 ? `${Math.abs(diff)} kcal over daily target` : 'Exactly on target';

  document.getElementById('weeklySummary').innerHTML = `
    <span class="weekly-label">Weekly avg</span>
    <div class="weekly-stats">
      <div class="w-stat"><span class="w-val">${avgCal}</span><span class="w-sub">kcal / day</span></div>
      <div class="w-stat"><span class="w-val" style="color:var(--green)">${avgP}g</span><span class="w-sub">protein</span></div>
      <div class="w-stat"><span class="w-val" style="color:var(--amber)">${avgC}g</span><span class="w-sub">carbs</span></div>
      <div class="w-stat"><span class="w-val" style="color:var(--rose)">${avgF}g</span><span class="w-sub">fat</span></div>
    </div>
    <span class="weekly-note">${noteText}</span>`;
}

function renderMacroBar(tot) {
  const items = [
    {id:'cal', val:tot.cal, target:TARGETS.cal, unit:'kcal', color:'var(--blue)'},
    {id:'p',   val:tot.p,   target:TARGETS.p,   unit:'g',    color:'var(--green)'},
    {id:'c',   val:tot.c,   target:TARGETS.c,   unit:'g',    color:'var(--amber)'},
    {id:'f',   val:tot.f,   target:TARGETS.f,   unit:'g',    color:'var(--rose)'},
  ];
  items.forEach(item => {
    const over = item.val > item.target;
    const el = document.getElementById('mc-'+item.id);
    el.innerHTML = r(item.val) + `<span class="macro-unit"> ${item.unit}</span>`;
    el.className = 'macro-val' + (over ? ' over' : '');
    document.getElementById('mp-'+item.id).style.width = pct(item.val, item.target) + '%';
    document.getElementById('mp-'+item.id).style.background = over ? 'var(--red)' : item.color;
  });
}

function renderTabs() {
  document.getElementById('dayTabs').innerHTML = DAYS.map((d, i) => {
    const tot = calcDay(d);
    const over = tot.cal > TARGETS.cal;
    return `<button class="day-tab ${i===currentDay?'active':''} ${over?'over-cal':''}" onclick="switchDay(${i})">
      ${d.label} <span class="tab-cal">${r(tot.cal)}</span>
    </button>`;
  }).join('');
}

function renderMeals() {
  const day = DAYS[currentDay];
  document.getElementById('mealsList').innerHTML = day.meals.map((m, mi) => {
    const key = `${currentDay}-${mi}`;
    const isOpen = openMeals[key] !== false;
    let mTot = {cal:0,p:0,c:0,f:0};
    m.foods.forEach(f => { mTot.cal+=f.cal; mTot.p+=f.p; mTot.c+=f.c; mTot.f+=f.f; });

    return `<div class="meal-card">
      <div class="meal-header" onclick="toggleMeal('${key}')">
        <div class="meal-left">
          <div class="meal-name">${m.name}</div>
          <div class="meal-dish">${m.dish}</div>
        </div>
        <div class="meal-macros">
          <span class="meal-cal">${r(mTot.cal)}</span>
          <span class="meal-sep">·</span>
          <span class="meal-macro-tag" style="color:var(--green)">${r(mTot.p)}g P</span>
          <span class="meal-macro-tag" style="color:var(--amber)">${r(mTot.c)}g C</span>
          <span class="meal-macro-tag" style="color:var(--rose)">${r(mTot.f)}g F</span>
        </div>
        <button class="chevron ${isOpen?'open':''}">▾</button>
      </div>
      ${isOpen ? `<div class="meal-body">
        <div class="recipe-block">${m.recipe}</div>
        <div class="food-hdr">
          <span class="hdr-c">Ingredient</span>
          <span class="hdr-c">kcal</span>
          <span class="hdr-c">P</span>
          <span class="hdr-c">C</span>
          <span class="hdr-c">F</span>
        </div>
        ${m.foods.map(food => `<div class="food-row">
          <span class="food-name">${food.n}<br><span class="food-qty">${food.q}</span></span>
          <span class="num">${food.cal}</span>
          <span class="num">${food.p}g</span>
          <span class="num">${food.c}g</span>
          <span class="num">${food.f}g</span>
        </div>`).join('')}
      </div>` : ''}
    </div>`;
  }).join('');
}

function switchDay(i) {
  currentDay = i;
  renderMacroBar(calcDay(DAYS[i]));
  renderTabs();
  renderMeals();
}

function toggleMeal(key) {
  openMeals[key] = openMeals[key] === false ? true : false;
  renderMeals();
}

renderWeekly();
switchDay(0);
</script>
